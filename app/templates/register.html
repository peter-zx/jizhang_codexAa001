{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <h1>分销商注册</h1>
  <p>注册必须使用总舵主生成的邀请码。</p>
  <form method="post" action="/auth/register">
    <label>邀请码<input name="invite_code" required value="{{ invite }}" autocomplete="one-time-code"></label>
    <label>用户名<input name="username" required autocomplete="username"></label>
    <label>显示名称<input name="display_name" required></label>
    <label>密码<input name="password" type="password" required minlength="8" autocomplete="new-password"></label>
    <button type="submit">注册</button>
  </form>
  <a href="/auth/login">已有账号，去登录</a>
</section>
{% endblock %}
